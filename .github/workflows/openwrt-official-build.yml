name: 🚀 Build Farm-GW (Final Fixed Version)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'OpenWrt Tag'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Your Config
        uses: actions/checkout@v4

      - name: Clone OpenWrt Source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ github.event.inputs.tag }}
          path: openwrt-src

      - name: Initialization Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip qemu-utils

      - name: Update Feeds & Add OpenClash
        working-directory: ./openwrt-src
        run: |
          # 将 OpenClash 加入 feed 列表（比直接 clone 到 package 更稳）
          echo "src-git openclash https://github.com/vernesong/OpenClash.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🛠️ Setup uci-defaults (Network & Password)
        working-directory: ./openwrt-src
        run: |
          mkdir -p files/etc/uci-defaults
          
          # 创建初始化脚本，确保在第一次启动时强制修改 IP 和 密码
          cat <<EOF > files/etc/uci-defaults/99-farm-setup
          # 1. 网络配置
          uci set network.lan.proto='static'
          uci set network.lan.ipaddr='10.10.10.2'
          uci set network.lan.netmask='255.255.255.0'
          uci set network.lan.gateway='10.10.10.1'
          uci del network.lan.bridge
          uci set network.lan.device='eth0'
          uci add_list network.lan.dns='9.9.9.9'
          uci add_list network.lan.dns='149.112.112.112'
          uci commit network

          # 2. 禁用 DHCP (旁路由模式)
          uci set dhcp.lan.ignore='1'
          uci commit dhcp

          # 3. 设置密码
          RAW_PASS="${{ secrets.OPENWRT_PASSWORD }}"
          [ -z "\$RAW_PASS" ] && RAW_PASS="password"
          echo "root:\$RAW_PASS" | chpasswd
          
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-farm-setup

      - name: Generate .config
        working-directory: ./openwrt-src
        run: |
          [ -e ../seed.config ] && cp ../seed.config .config
          
          # 强制确保 OpenClash 及其核心依赖被选中
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-openclash-zh-cn=y" >> .config
          
          # 移除可能冲突的包
          echo "CONFIG_PACKAGE_dnsmasq=n" >> .config
          
          make defconfig
          make download -j$(nproc)

      - name: Compile
        working-directory: ./openwrt-src
        run: |
          # 针对 Rust 和 CI 环境的特殊处理
          env -u GITHUB_ACTIONS -u GITHUB_WORKFLOW -u CI -u GITHUB_RUN_ID \
          make -j$(nproc) || make -j1 V=s

      - name: 📦 Build and Push Docker Image
        run: |
          ROOTFS_PATH=$(find openwrt-src/bin/targets/x86/64/ -name "*rootfs.tar.gz" | head -n 1)
          cp "$ROOTFS_PATH" openwrt-rootfs.tar.gz
          
          cat <<EOF > Dockerfile
          FROM scratch
          ADD openwrt-rootfs.tar.gz /
          # Docker 环境下 rootfs 可能不触发 uci-defaults，我们手动补一下执行权限
          RUN chmod +x /etc/uci-defaults/99-farm-setup
          EXPOSE 80 443
          ENTRYPOINT ["/sbin/init"]
          EOF

          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          REPO=${{ secrets.DOCKER_USERNAME }}/farm-gw-official
          TAG="${{ github.event.inputs.tag }}-farm-gw"
          docker build -t $REPO:$TAG -t $REPO:latest .
          docker push $REPO --all-tags
