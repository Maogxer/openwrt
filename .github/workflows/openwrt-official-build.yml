name: 🚀 Build Farm-GW (Auto Triggered)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'OpenWrt Tag to build (passed from monitor)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Your Config
        uses: actions/checkout@v4

      - name: Clone OpenWrt Source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ github.event.inputs.tag }}
          path: openwrt-src

      - name: Initialization Environment
        run: |
          sudo apt-get update
          # 移除了不存在的 sync 包，保留核心编译工具
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip

      - name: Add OpenClash Source
        working-directory: ./openwrt-src
        run: |
          # 根据 README 建议，直接将 OpenClash 源码拉入 package 目录
          mkdir -p package/luci-app-openclash
          git clone --depth 1 https://github.com/vernesong/OpenClash.git package/luci-app-openclash

      - name: Update and Install Feeds
        working-directory: ./openwrt-src
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🛠️ Pre-set Farm Configurations (Network & Anti-Reset)
        working-directory: ./openwrt-src
        run: |
          mkdir -p files/etc/config
          
          # 1. 固化 10.10.10.2 静态网络配置（根据你提供的 cat 结果还原）
          cat <<EOF > files/etc/config/network
          config interface 'loopback'
                  option device 'lo'
                  option proto 'static'
                  list ipaddr '127.0.0.1/8'

          config globals 'globals'
                  option dhcp_default_duid '0004f215738d2cea4a63bf93786a0894b598'
                  option ula_prefix 'fd27:15d:b540::/48'

          config interface 'lan'
                  option device 'eth0'
                  option proto 'static'
                  list ipaddr '10.10.10.2'
                  option netmask '255.255.255.0'
                  option gateway '10.10.10.1'
                  list dns '9.9.9.9'
                  list dns '149.112.112.112'
                  list dns '194.242.2.3'
                  list dns '76.76.2.2'
                  option ip6assign '60'
          EOF

          # 2. 预置强制关闭 DHCP 的配置
          cat <<EOF > files/etc/config/dhcp
          config dnsmasq
                  option domainneeded '1'
                  option localise_queries '1'
                  option rebind_protection '1'
                  option rebind_localhost '1'
                  option local '/lan/'
                  option domain 'lan'
                  option expandhosts '1'
                  option authoritative '1'
                  option readethers '1'
                  option leasefile '/tmp/dhcp.leases'
                  option resolvfile '/tmp/resolv.conf.d/resolv.conf.auto'
                  option localservice '1'

          config dhcp 'lan'
                  option interface 'lan'
                  option ignore '1'

          config dhcp 'wan'
                  option interface 'wan'
                  option ignore '1'

          config odhcpd 'odhcpd'
                  option maindhcp '0'
                  option leasefile '/tmp/odhcpd.leases'
          EOF

          # 3. 动态处理 Root 密码 (从 GitHub Secrets 获取)
          mkdir -p files/etc
          RAW_PASS="${{ secrets.OPENWRT_PASSWORD }}"
          [ -z "$RAW_PASS" ] && RAW_PASS="password" 
          ENCRYPTED_PASS=$(openssl passwd -1 "$RAW_PASS")
          echo "root:$ENCRYPTED_PASS:18753:0:99999:7:::" > files/etc/shadow

      - name: Generate .config
        working-directory: ./openwrt-src
        run: |
          # 复制你本地的 seed.config
          [ -e ../seed.config ] && cp ../seed.config .config
          # 确保开启 rootfs 生成
          echo "CONFIG_TARGET_ROOTFS_TARGZ=y" >> .config
          # 强制勾选 OpenClash 及其依赖
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          make defconfig

      - name: 🛠️ Fix Rust Build Error
        working-directory: ./openwrt-src
        run: |
          # 修复 Rust 在 CI 环境下的构建配置矛盾
          if [ -d "feeds/packages/lang/rust" ]; then
            sed -i 's/download-ci-llvm = true/download-ci-llvm = "if-unchanged"/g' feeds/packages/lang/rust/Makefile || true
          fi
          # 另外，既然是在 Docker 里跑，我们可以尽量跳过 host 端的工具编译
          echo "CONFIG_MAKE_TOOLCHAIN=y" >> .config

      - name: Compile Rootfs
        working-directory: ./openwrt-src
        run: |
          make download -j$(nproc)
          make -j$(nproc) || make -j1 V=s
          
      - name: Build and Push Docker Image
        run: |
          ROOTFS_PATH=$(find openwrt-src/bin/targets/x86/64/ -name "*-rootfs.tar.gz" | head -n 1)
          cp "$ROOTFS_PATH" openwrt-rootfs.tar.gz
          
          cat <<EOF > Dockerfile
          FROM scratch
          ADD openwrt-rootfs.tar.gz /
          EXPOSE 80 443 22
          ENTRYPOINT ["/sbin/init"]
          EOF

          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          REPO=${{ secrets.DOCKER_USERNAME }}/farm-gw-official
          # 镜像标签带上 farm-gw 标识以区分官方版
          TAG="${{ github.event.inputs.tag }}-farm-gw"
          
          docker build -t $REPO:$TAG -t $REPO:latest .
          docker push $REPO --all-tags
