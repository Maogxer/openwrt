name: 🚀 Build and Push OpenWrt Docker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'OpenWrt Tag to build'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Your Config
        uses: actions/checkout@v4

      - name: 📥 Clone OpenWrt Source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ github.event.inputs.tag }}
          path: openwrt-src

      - name: 🛠️ Initialization Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync \
            unzip zlib1g-dev file wget
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: 🧩 Add OpenClash Feed
        working-directory: ./openwrt-src
        run: |
          echo "src-git openclash https://github.com/vernesong/OpenClash.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🛠️ Fix Rust Build Error (Bypass CI Check)
        working-directory: ./openwrt-src
        run: |
          # 解决 10_Compile Rootfs.txt 中的 llvm.download-ci-llvm 报错
          echo "RUST_INSTALL_USE_CI_LLVM=false" >> $GITHUB_ENV
          find feeds/packages/lang/rust -name "Makefile" -exec sed -i 's/download-ci-llvm = true/download-ci-llvm = "if-unchanged"/g' {} +
          # 强制在配置中禁用不必要的 Rust 包
          echo "CONFIG_HAS_RUST=n" >> .config
          echo "CONFIG_PACKAGE_rust=n" >> .config

      - name: ⚙️ Load Config & Build Rootfs
        working-directory: ./openwrt-src
        run: |
          [ -e ../seed.config ] && cp ../seed.config .config
          echo "CONFIG_TARGET_ROOTFS_TARGZ=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-openclash-zh-cn=y" >> .config
          
          make defconfig
          make download -j$(nproc)
          # 编译 rootfs
          make -j$(nproc) || make -j1 V=s

      - name: 🏗️ Prepare Docker Context
        run: |
          # 寻找生成的 rootfs 文件
          ROOTFS_PATH=$(find openwrt-src/bin/targets/x86/64/ -name "*-rootfs.tar.gz" | head -n 1)
          if [ -z "$ROOTFS_PATH" ]; then echo "Rootfs not found!"; exit 1; fi
          cp "$ROOTFS_PATH" openwrt-rootfs.tar.gz
          
          # 创建 Dockerfile
          cat <<EOF > Dockerfile
          FROM scratch
          ADD openwrt-rootfs.tar.gz /
          EXPOSE 80 443 22
          ENTRYPOINT ["/sbin/init"]
          EOF

      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 这里的镜像名请修改为：用户名/仓库名
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/openwrt-farm-gw:${{ github.event.inputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/openwrt-farm-gw:latest

      - name: 📤 Upload Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Rootfs_${{ github.event.inputs.tag }}
          path: openwrt-rootfs.tar.gz
