name: 🚨 OpenWrt Official Version Monitor

on:
  schedule:
    - cron: '0 22 * * *' # 北京时间每天凌晨 6 点自动运行
  push:
    paths:
      - 'seed.config'     # 🌟 你修改配置推送到 GitHub 时触发
  workflow_dispatch:      # 允许手动点击运行

jobs:
  check_and_trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout THIS repository
        uses: actions/checkout@v4

      - name: Check Version and Determine Action
        id: check
        run: |
          # 1. 获取官方最新 Tag
          LATEST_TAG=$(curl -s https://api.github.com/repos/openwrt/openwrt/releases/latest | jq -r .tag_name)
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_OUTPUT
          
          # 2. 读取本地记录
          LAST_TAG=""
          [ -f last_openwrt_tag.txt ] && LAST_TAG=$(cat last_openwrt_tag.txt)
          
          # 3. 核心逻辑判断：是否需要启动构建
          SHOULD_BUILD="false"
          
          if [ "$LATEST_TAG" != "$LAST_TAG" ]; then
            echo "原因: 官方发布了新版本 $LATEST_TAG"
            SHOULD_BUILD="true"
            echo "UPDATE_LOCAL_FILE=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "原因: 手动触发或 seed.config 变动"
            SHOULD_BUILD="true"
          fi
          
          echo "SHOULD_BUILD=$SHOULD_BUILD" >> $GITHUB_OUTPUT

      - name: Trigger Build Workflow
        if: steps.check.outputs.SHOULD_BUILD == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'openwrt-official-build.yml', 
              ref: context.ref,
              inputs: { tag: "${{ steps.check.outputs.LATEST_TAG }}" }
            });

      - name: Update Tag File
        if: steps.check.outputs.UPDATE_LOCAL_FILE == 'true'
        run: |
          echo "${{ steps.check.outputs.LATEST_TAG }}" > last_openwrt_tag.txt

      - name: Commit Tag Update
        if: steps.check.outputs.UPDATE_LOCAL_FILE == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'CI: Update last known OpenWrt Tag'
          file_pattern: 'last_openwrt_tag.txt'
